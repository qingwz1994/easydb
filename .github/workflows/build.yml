name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            label: macOS-ARM64
            jre_url: 'https://api.adoptium.net/v3/binary/latest/21/ga/mac/aarch64/jre/hotspot/normal/eclipse'
            jre_ext: tar.gz
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            label: macOS-x64
            jre_url: 'https://api.adoptium.net/v3/binary/latest/21/ga/mac/x64/jre/hotspot/normal/eclipse'
            jre_ext: tar.gz
          - platform: windows-latest
            args: ''
            rust_target: ''
            label: Windows-x64
            jre_url: 'https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse'
            jre_ext: zip
          - platform: ubuntu-22.04
            args: '--bundles deb,rpm'
            rust_target: ''
            label: Linux-x64
            jre_url: 'https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jre/hotspot/normal/eclipse'
            jre_ext: tar.gz

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 自动注入版本号（从 tag 提取） ---
      - name: Inject version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "📦 Detected version: $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" apps/desktop-ui/src-tauri/tauri.conf.json
          # Update Cargo.toml (only first occurrence)
          sed -i.bak "0,/^version = .*/s//version = \"$VERSION\"/" apps/desktop-ui/src-tauri/Cargo.toml
          rm -f apps/desktop-ui/src-tauri/tauri.conf.json.bak apps/desktop-ui/src-tauri/Cargo.toml.bak
          echo "✅ Version set to $VERSION"

      # --- Linux 系统依赖 ---
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # --- JDK (用于编译 Kernel) ---
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # --- Gradle 缓存 ---
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            kernel/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('kernel/**/*.gradle*', 'kernel/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # --- 构建 Kernel JAR ---
      - name: Build Kernel
        shell: bash
        working-directory: kernel
        run: |
          chmod +x gradlew
          ./gradlew :launcher:shadowJar --no-daemon
          mkdir -p ../apps/desktop-ui/src-tauri/resources
          cp launcher/build/libs/*-all.jar ../apps/desktop-ui/src-tauri/resources/easydb-kernel.jar
          echo "✅ Kernel JAR size: $(du -h ../apps/desktop-ui/src-tauri/resources/easydb-kernel.jar | cut -f1)"

      - name: Download and embed JRE (Unix)
        if: matrix.jre_ext == 'tar.gz'
        shell: bash
        run: |
          echo "Downloading JRE for ${{ matrix.label }}..."
          curl -L -o jre.tar.gz "${{ matrix.jre_url }}"
          mkdir -p jre-tmp
          tar xzf jre.tar.gz -C jre-tmp
          # 动态查找 bin/java 所在的目录（macOS: .../Contents/Home/, Linux: .../）
          JAVA_BIN=$(find jre-tmp -name "java" -path "*/bin/java" -type f | head -1)
          JRE_HOME=$(dirname $(dirname "$JAVA_BIN"))
          echo "Found JRE at: $JRE_HOME"
          # 复制到 resources/jre
          mkdir -p apps/desktop-ui/src-tauri/resources/jre
          cp -r "$JRE_HOME"/* apps/desktop-ui/src-tauri/resources/jre/
          chmod +x apps/desktop-ui/src-tauri/resources/jre/bin/java
          echo "✅ JRE embedded: $(apps/desktop-ui/src-tauri/resources/jre/bin/java -version 2>&1 | head -1)"
          rm -rf jre-tmp jre.tar.gz

      - name: Download and embed JRE (Windows)
        if: matrix.jre_ext == 'zip'
        shell: pwsh
        run: |
          Write-Host "Downloading JRE for ${{ matrix.label }}..."
          Invoke-WebRequest -Uri "${{ matrix.jre_url }}" -OutFile jre.zip
          Expand-Archive -Path jre.zip -DestinationPath jre-tmp
          # 获取解压后的顶层目录名
          $jreDir = Get-ChildItem -Path jre-tmp -Directory | Select-Object -First 1
          # 移动到 resources/jre
          New-Item -ItemType Directory -Force -Path "apps/desktop-ui/src-tauri/resources/jre"
          Copy-Item -Recurse -Force "$($jreDir.FullName)/*" "apps/desktop-ui/src-tauri/resources/jre/"
          Write-Host "✅ JRE embedded"
          Remove-Item -Recurse -Force jre-tmp, jre.zip

      # --- Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      # --- Rust ---
      - name: Setup Rust (with target)
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust (default)
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop-ui/src-tauri -> target'

      # --- 构建 Tauri ---
      - name: Build Tauri app
        shell: bash
        working-directory: apps/desktop-ui
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: npx tauri build ${{ matrix.args }}

      # --- 上传产物 ---
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EasyDB-${{ matrix.label }}
          path: |
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.msi
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.nsis.zip
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop-ui/src-tauri/target/**/release/bundle/**/*.rpm
          if-no-files-found: warn
          retention-days: 30

  # --- 发布 Release ---
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
