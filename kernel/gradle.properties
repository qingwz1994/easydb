# EasyDB Kernel - Gradle 构建属性
# 统一管理版本号，避免各模块重复声明

# Kotlin
kotlinVersion=1.9.22

# Ktor
ktorVersion=2.3.7

# Serialization
serializationVersion=1.6.2

# Coroutines
coroutinesVersion=1.7.3

# Logging
logbackVersion=1.4.14

# SSH
jschVersion=0.2.16

# Shadow
shadowVersion=8.1.1

# JVM
jvmTarget=21

# Gradle
org.gradle.jvmargs=-Xmx1024m
org.gradle.parallel=true
org.gradle.caching=true
